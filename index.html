 <head>
  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #fff;
      overflow: hidden;
    }

    .app-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; }

    .header {
      background: rgba(48, 43, 99, 0.8);
      padding: clamp(0.6rem, 2vw, 1.2rem);
      border-bottom: 2px solid #64b5f6;
      text-align: center;
      flex-shrink: 0;
    }

    .title {
      font-size: clamp(1rem, 5vw, 2.2rem);
      font-weight: 700;
      color: #64b5f6;
      text-shadow: 0 0 15px rgba(100, 181, 246, 0.5);
      margin: 0;
    }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 3vw, 2rem);
      position: relative;
      min-height: 0;
    }

    .slide-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.2);
      border-radius: clamp(10px, 3vw, 20px);
      border: 2px solid rgba(100, 181, 246, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      position: relative;
    }

    .slide-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 10px;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.5rem, 1.5vw, 1rem);
      padding: clamp(0.8rem, 2vw, 1.2rem);
      background: rgba(48, 43, 99, 0.9);
      border-top: 2px solid #64b5f6;
      flex-wrap: wrap;
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 25vh;
    }

    .btn {
      background: #42a5f5;
      color: white;
      padding: clamp(0.6rem, 1.5vw, 0.75rem) clamp(0.8rem, 2vw, 1.25rem);
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      font-size: clamp(0.7rem, 2vw, 1rem);
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-3px);
      background: #2196f3;
      box-shadow: 0 6px 20px rgba(100, 181, 246, 0.6);
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-voice-active { background: #4caf50 !important; }
    .btn-voice-inactive { background: #ff9800 !important; }
    .btn-fullscreen { background: #00bcd4 !important; }

    .slide-info { 
      display: flex; 
      align-items: center; 
      gap: clamp(0.3rem, 1vw, 0.5rem); 
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      font-weight: bold;
    }

    .progress-bar {
      width: clamp(120px, 20vw, 200px);
      height: 6px;
      background: rgba(100, 181, 246, 0.2);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid rgba(100, 181, 246, 0.4);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffc107, #ff9800);
      width: 0%;
      transition: 0.4s;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(100, 200, 255, 0.1), rgba(255, 100, 200, 0.1));
      border-radius: 12px;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #a0c4ff;
    }

    .link-buttons {
      position: absolute;
      bottom: clamp(20px, 3vh, 40px);
      left: 0;
      width: 100%;
      display: flex;
      gap: clamp(8px, 2vw, 12px);
      flex-wrap: wrap;
      justify-content: center;
      padding: clamp(6px, 2vw, 12px);
      pointer-events: none;
    }

    .link-buttons a {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      padding: clamp(8px, 1.5vw, 12px) clamp(12px, 2vw, 18px);
      border-radius: 999px;
      box-shadow: 0 10px 26px rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      transition: transform .25s ease, filter .25s ease;
      filter: saturate(1.05);
      font-size: clamp(0.7rem, 2vw, 0.9rem);
    }

    .link-buttons a:hover {
      transform: translateY(-2px) scale(1.03);
      filter: saturate(1.2);
    }

    .notes-panel {
      position: fixed;
      right: -100%;
      top: 0;
      width: min(420px, 90vw);
      height: 100%;
      background: rgba(15, 12, 41, 0.95);
      border-left: 2px solid #b366ff;
      transition: 0.4s ease;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.5);
    }

    .notes-panel.active { right: 0; }

    .notes-header {
      padding: clamp(1rem, 2vw, 1.5rem);
      border-bottom: 1px solid rgba(100, 181, 246, 0.4);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(100, 181, 246, 0.1);
      flex-shrink: 0;
    }

    .notes-header h3 { 
      font-size: clamp(0.9rem, 2.5vw, 1.1rem); 
      color: #64b5f6;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0;
    }

    .notes-indicator {
      display: none;
      color: #4caf50;
      font-weight: bold;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
    }

    .notes-indicator.active {
      display: inline;
    }

    .notes-close {
      color: #64b5f6;
      background: none;
      border: none;
      cursor: pointer;
      font-size: clamp(1.2rem, 3vw, 1.5rem);
      transition: 0.2s;
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .notes-close:hover { color: #42a5f5; }

    #notes-text {
      flex: 1;
      background: rgba(15, 12, 41, 0.9);
      color: #fff;
      padding: clamp(1rem, 2vw, 1.5rem);
      border: none;
      outline: none;
      resize: none;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      border-top: 1px solid rgba(100, 181, 246, 0.2);
      font-family: 'Segoe UI', sans-serif;
      line-height: 1.6;
      white-space: pre-wrap;
      min-height: 0;
    }

    #notes-text::placeholder { color: rgba(255, 255, 255, 0.4); }

    .notes-buttons {
      padding: clamp(0.8rem, 2vw, 1.2rem);
      display: flex;
      gap: clamp(6px, 1.5vw, 8px);
      flex-wrap: wrap;
      background: rgba(100, 181, 246, 0.05);
      border-top: 1px solid rgba(100, 181, 246, 0.2);
      flex-shrink: 0;
    }

    .notes-btn {
      flex: 1;
      min-width: 100px;
      padding: clamp(0.6rem, 1.5vw, 0.7rem);
      font-size: clamp(0.65rem, 1.5vw, 0.8rem);
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
      color: white;
    }

    .notes-btn-primary { background: #b366ff; }
    .notes-btn-primary:hover { background: #9d4edd; transform: translateY(-2px); }

    .notes-btn-success { background: #4caf50; }
    .notes-btn-success:hover { background: #45a049; transform: translateY(-2px); }

    .notes-btn-danger { background: #f44336; }
    .notes-btn-danger:hover { background: #da190b; transform: translateY(-2px); }

    #voice-status {
      font-weight: 800;
      opacity: .95;
      padding: clamp(0.2rem, 1vw, 0.3rem) clamp(0.5rem, 1.5vw, 0.7rem);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .controls {
        gap: 0.5rem;
        padding: 0.6rem;
      }
      
      .btn {
        padding: 0.5rem 0.75rem;
        font-size: 0.75rem;
      }

      .slide-info {
        font-size: 0.7rem;
      }

      .notes-panel {
        width: 100vw;
        right: -100vw;
      }

      .progress-bar {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .controls {
        gap: 0.4rem;
        padding: 0.5rem;
        max-height: 30vh;
      }
      
      .btn {
        padding: 0.4rem 0.6rem;
        font-size: 0.65rem;
      }

      .slide-info {
        font-size: 0.65rem;
      }

      .content {
        padding: 0.8rem;
      }

      .header {
        padding: 0.5rem;
      }
    }
  </style>

 <body>
  <div class="app-wrapper">
   <div class="header">
    <h1 class="title" id="presentation-title">Introdução à Anatomia Humana</h1>
   </div>
   <div class="content">
    <div class="slide-container" id="slide-container">
     <div class="placeholder">
      <div style="font-size: 3rem; margin-bottom: 1rem;">
       📊
      </div>
      <div>
       Carregando slide...
      </div>
     </div>
    </div>
   </div>
   <div class="controls">
    <button class="btn" id="prev-btn" onclick="previousSlide()">← Anterior</button>
    <div class="slide-info">
     <span id="slide-num" style="font-weight:bold;">1 / 37</span>
    </div>
    <div class="progress-bar">
     <div class="progress-fill" id="progress-fill"></div>
    </div><button class="btn" style="background:#9c27b0" onclick="toggleNotes()">📝 Notas</button> <button class="btn btn-voice-inactive" id="voice-btn" onclick="toggleVoice()">🎤 Voz</button> <span id="voice-status">🎤 Desligada</span> <button class="btn" id="link-btn" onclick="openCurrentLink()" style="background:#ff6b6b; display:none;">📅 Link</button> <button class="btn btn-fullscreen" onclick="toggleFullscreen()">⛶ Tela Cheia</button> <button class="btn" id="next-btn" onclick="nextSlide()">Próximo →</button>
   </div>
  </div>
  <div class="notes-panel" id="notes-panel">
   <div class="notes-header">
    <h3>📝 Slide <span id="note-num">1</span> <span class="notes-indicator" id="notes-indicator">✓</span></h3><button class="notes-close" onclick="toggleNotes()">✕</button>
   </div><textarea id="notes-text" placeholder="Escreva suas observações..."></textarea>
   <div class="notes-buttons">
    <button class="notes-btn notes-btn-primary" onclick="extractText()">📄 Extrair</button> <button class="notes-btn notes-btn-success" onclick="downloadPDF()">📥 PDF</button> <button class="notes-btn notes-btn-danger" onclick="clearNotes()">🗑️ Limpar</button>
   </div>
  </div>
  <script>
    let currentSlide = 1;
    const totalSlides = 37;

    let voiceActive = false;
    let recognition = null;

    function normalizeText(s) {
      return (s || "")
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function setVoiceUI(active, msg = "") {
      const btn = document.getElementById("voice-btn");
      const status = document.getElementById("voice-status");

      if (active) {
        btn.classList.add("btn-voice-active");
        btn.classList.remove("btn-voice-inactive");
        btn.textContent = "🎤 Ouvindo";
        status.textContent = msg ? `🎤 ${msg}` : "🎤 Ativo";
      } else {
        btn.classList.remove("btn-voice-active");
        btn.classList.add("btn-voice-inactive");
        btn.textContent = "🎤 Voz";
        status.textContent = msg ? `🎤 ${msg}` : "🎤 Desligada";
      }
    }

    function parseSlideNumber(cmd) {
      const m = cmd.match(/\b(\d{1,3})\b/);
      if (m) return parseInt(m[1], 10);

      const map = {
        "um": 1, "uma": 1,
        "dois": 2, "duas": 2,
        "tres": 3,
        "quatro": 4,
        "cinco": 5,
        "seis": 6,
        "sete": 7,
        "oito": 8,
        "nove": 9,
        "dez": 10,
        "onze": 11,
        "doze": 12,
        "treze": 13,
        "quatorze": 14,
        "catorze": 14,
        "quinze": 15,
        "dezesseis": 16,
        "dezessete": 17,
        "dezoito": 18,
        "dezenove": 19,
        "vinte": 20
      };

      for (const [k, v] of Object.entries(map)) {
        if (cmd.includes(` ${k}`) || cmd.endsWith(k)) return v;
      }
      return null;
    }

    function openLinkForSlide(slideNumber, preferLabelIncludes = "") {
      const s = slideData[slideNumber];
      if (!s || !s.links || !s.links.length) return false;

      let link = s.links[0];
      if (preferLabelIncludes) {
        const found = s.links.find(l => normalizeText(l.label).includes(normalizeText(preferLabelIncludes)));
        if (found) link = found;
      }
      window.open(link.url, "_blank", "noopener,noreferrer");
      return true;
    }

    function openCurrentLink() {
      openLinkForSlide(currentSlide);
    }

    function handleVoiceCommand(raw) {
      const cmd = normalizeText(raw);

      if (cmd.includes("proximo") || cmd.includes("avancar") || cmd.includes("seguir")) {
        setVoiceUI(true, "Próximo");
        nextSlide();
        return;
      }

      if (cmd.includes("anterior") || cmd.includes("voltar") || cmd.includes("retornar")) {
        setVoiceUI(true, "Anterior");
        previousSlide();
        return;
      }

      if (cmd.includes("ir para") || cmd.includes("vai para") || cmd.includes("slide") || cmd.includes("pagina")) {
        const n = parseSlideNumber(cmd);
        if (n != null) {
          setVoiceUI(true, `Slide ${n}`);
          goToSlide(n);
          return;
        }
      }

      if (cmd.includes("primeiro")) { setVoiceUI(true, "Primeiro"); goToSlide(1); return; }
      if (cmd.includes("ultimo") || cmd.includes("final")) { setVoiceUI(true, "Último"); goToSlide(totalSlides); return; }

      if (cmd.includes("abrir notas") || cmd.includes("mostrar notas")) { setVoiceUI(true, "Notas"); openNotes(true); return; }
      if (cmd.includes("fechar notas") || cmd.includes("esconder notas")) { setVoiceUI(true, "Fechar"); openNotes(false); return; }

      if (cmd.includes("extrair") || cmd.includes("transcrever")) { setVoiceUI(true, "Extraindo"); extractText(); return; }
      if (cmd.includes("baixar pdf") || cmd.includes("gerar pdf") || cmd.includes("download pdf")) { setVoiceUI(true, "PDF"); downloadPDF(); return; }
      if (cmd.includes("limpar") || cmd.includes("apagar notas")) { setVoiceUI(true, "Limpando"); clearNotes(); return; }

      if (cmd.includes("cronograma")) {
        setVoiceUI(true, "Cronograma");
        openLinkForSlide(1, "cronograma");
        return;
      }
      if (cmd.includes("teste")) {
        setVoiceUI(true, "Teste");
        openLinkForSlide(18, "teste");
        return;
      }
      if (cmd.includes("jogos")) {
        setVoiceUI(true, "Jogos");
        openLinkForSlide(18, "jogos");
        return;
      }

      if (cmd.includes("abrir link") || cmd.includes("link")) {
        setVoiceUI(true, "Abrindo");
        openCurrentLink();
        return;
      }

      if (cmd.includes("tela cheia") || cmd.includes("fullscreen")) {
        setVoiceUI(true, "Tela cheia");
        toggleFullscreen();
        return;
      }

      setVoiceUI(true, `"${raw.trim()}"`);
    }

    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;

      const r = new SR();
      r.lang = "pt-BR";
      r.continuous = true;
      r.interimResults = true;

      let lastFinal = "";

      r.onstart = () => setVoiceUI(true);
      r.onerror = (e) => setVoiceUI(voiceActive, `Erro`);

      r.onresult = (e) => {
        let interim = "";
        let finalTxt = "";

        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) finalTxt += t + " ";
          else interim += t + " ";
        }

        if (interim.trim()) setVoiceUI(true, `Ouvindo...`);

        const cleanFinal = finalTxt.trim();
        if (cleanFinal && cleanFinal !== lastFinal) {
          lastFinal = cleanFinal;
          handleVoiceCommand(cleanFinal);
        }
      };

      r.onend = () => {
        if (voiceActive) {
          try { r.start(); } catch (_) {}
        } else {
          setVoiceUI(false);
        }
      };

      return r;
    }

    function toggleVoice() {
      if (!recognition) recognition = setupRecognition();
      if (!recognition) { 
        setVoiceUI(false, "Não suportado");
        return; 
      }

      voiceActive = !voiceActive;

      if (voiceActive) {
        try { recognition.start(); } catch (e) {}
        setVoiceUI(true, "Ativa");
      } else {
        try { recognition.stop(); } catch (_) {}
        setVoiceUI(false);
      }
    }

    const slideData = {
      1: {
        text:
`Página 1: Capa
- Texto principal: Introdução a Anatomia humana
- Professora: Claudia Pinheiro
- Conteúdo adicional: Fragmentos de texto em latim (Lorem Ipsum) e elementos gráficos decorativos.`,
        links: [
          { label: "📅 Cronograma", url: "https://pinheiro767.github.io/Turma-seg-2026/", color: "#ff9800" }
        ]
      },
      2: { text: `Página 2: História Antiga\n- "A anatomia é uma das mais antigas ciências médicas básicas: foi estudada formalmente pela primeira vez no Egito (aproximadamente 500 a.C.)".` },
      3: { text: `Página 3: Galeno\n- Galeno viveu nos séculos II e III durante o Império Romano.\n- É considerado o primeiro anatomista do mundo.\n- Tinha experiência apenas em dissecação de porcos, macacos e outros animais.` },
      4: { text: `Página 4: Andreas Vesalius\n- Andreas Vesalius (1514-1564) é considerado o Pai da Anatomia Moderna e um ícone da Renascença.\n- Seus estudos avançaram em relação aos de Galeno por utilizar a dissecação de corpos humanos em vez de animais.` },
      5: { text: `Página 5: Ressurrecionistas\n- Conhecidos como ressurrecionistas, pessoas passaram séculos desenterrando corpos de túmulos para revendê-los a estudiosos.` },
      6: { text: `Página 6: Proteção de Túmulos\n- Mortsafes: Grades colocadas sobre os túmulos para evitar o roubo de corpos.` },
      7: { text: `Página 7: William Burke e William Hare\n- William Hare e sua esposa administravam uma pensão em Edimburgo onde William Burke morava.\n- Tornaram-se uma dupla que eliminava vítimas para lucrar com a venda dos corpos.` },
      8: { text: `Página 8: Etimologia\n- Anatomia: Do grego anatome ("corte através de").\n- Dissecação: Do latim dis secare ("cortar separado").` },
      9: { text: `Página 9: Subdivisões Anatômicas\n- Anatomia Macroscópica.\n- Anatomia Microscópica.\n- Anatomia do Desenvolvimento.` },
      10:{ text: `Página 10: Organização\n- Níveis de Organização e Sistemas do Corpo.` },
      11:{ text: `Página 11: Ilustração de Níveis\n- Representação visual em hexágonos: Átomo, Molécula, Tecido, Célula (Organelas), Coração (Órgão) e Sistema.` },
      12:{ text: `Página 12: Métodos de Estudo\n- Anatomia regional.\n- Anatomia sistêmica.\n- Anatomia clínica.\n- Termos isolados: Tecido, Órgão.` },
      13:{ text: `Página 13: Formas de Estudo\n- Dissecação.\n- Imagens.\n- Modelos.\n- Apalpação.\n- Auscultação.` },
      14:{ text: `Página 14: Considerações Anatômicas\n- Divisão do corpo humano.\n- Posição Anatômica.` },
      15:{ text: `Página 15: Posição Anatômica (Padrões)\n1) A cabeça, os olhos e os dedos dos pés voltados anteriormente (para frente).\n2) Os braços ao lado do corpo, com as palmas voltadas anteriormente.\n3) Os membros inferiores próximos, com os pés paralelos.` },
      16:{ text: `Página 16: Termos de Movimento\n- Introdução aos termos de movimento.` },
      17:{ text: `Página 17: Planos e Eixos\n- Os movimentos do corpo humano ocorrem em planos e eixos específicos, envolvendo a interação entre ossos, músculos e articulações.` },
      18:{
        text:`Página 18: Planos Anatômicos\n- Indicação de Plano Transversal (Mediano) e Plano Sagital.`,
        links:[
          { label:"🎮 Jogos", url:"https://pinheiro767.github.io/Inicio-anato-2026/", color:"#4caf50" },
          { label:"🧪 Teste", url:"https://pinheiro767.github.io/Inicio-anato-2026/", color:"#b366ff" }
        ]
      },
      19:{ text:`Página 19: Plano Mediano\n- O plano mediano divide o corpo humano em lados direito e esquerdo.` },
      20:{ text:`Página 20: Plano Sagital\n- Divide o corpo em duas partes assimétricas.` },
      21:{ text:`Página 21: Plano Frontal\n- Também chamado de Coronal, divide o corpo em partes anterior e posterior.` },
      22:{ text:`Página 22: Plano Transverso\n- Também chamado de Axial, divide o corpo em partes superior e inferior.` },
      23:{ text:`Página 23: Eixos do Corpo Humano\n- Linhas imaginárias que atravessam planos paralelos em torno das quais ocorrem os movimentos.` },
      24:{ text:`Página 24: Plano Frontal x Eixo Sagital\n- Movimentos de Abdução e Adução ocorrem em planos frontais em torno de um eixo ântero-posterior.` },
      25:{ text:`Página 25: Plano Sagital x Eixo Látero-lateral\n- Os movimentos de Flexão e Extensão geralmente ocorrem em planos sagitais em torno de um eixo transverso.` },
      26:{ text:`Página 26: Plano Transversal x Eixo Longitudinal\n- Os movimentos de Rotação ocorrem no plano transversal e acontecem em torno do eixo longitudinal.` },
      27:{ text:`Página 27: Descrição de Movimentos\n- Flexão: Diminui o ângulo entre segmentos.\n- Abdução e Adução: Afasta e aproxima parte do corpo à linha média.\n- Rotação: Gira uma parte em torno de um eixo.\n- Circundação: Movimento circular que combina flexão, abdução e adução.` },
      28:{ text:`Página 28: Importância dos Movimentos\n- Compreender esses movimentos é fundamental para profissionais da saúde e do esporte para mobilidade e prevenção de lesões.` },
      29:{ text:`Página 29: Cortes Anatômicos\n- O principal uso dos planos é descrever cortes:\n  • Corte Longitudinal\n  • Corte Oblíquo\n  • Corte Transverso` },
      30:{ text:`Página 30: Revisão de Planos\n- Ilustrações dos planos Sagital e Transversal.` },
      31:{ text:`Página 31: Terminologia Anatômica\n- Início da seção sobre Terminologia Anatômica e Posição Anatômica.` },
      32:{ text:`Página 32: Termos de Relação e Comparação (Parte 1)\n- Superior (Cranial): Mais próximo da cabeça.\n- Inferior (Caudal): Mais próximo dos pés.\n- Anterior (Ventral): Mais próximo da frente do corpo.\n- Posterior (Dorsal): Mais próximo das costas.\n- Palmar vs Dorsal (mão) e Plantar vs Dorsal (pé).\n- Superficial, Intermediário e Profundo.\n- Medial: Mais próximo do plano mediano.\n- Lateral: Mais distante do plano mediano.` },
      33:{ text:`Página 33: Termos de Relação e Comparação (Parte 2)\n- Diagramas exemplificando: Superficial, Intermédio, Profundo, Distal, Medial, Proximal e Lateral.` },
      34:{ text:`Página 34: Conceito: Normal\n- Refere-se às características anatômicas presentes na maioria da população, consideradas mais frequentes.` },
      35:{ text:`Página 35: Conceito: Anomalia\n- Alteração morfológica que difere do normal e traz prejuízo à função, mas é compatível com a vida (ex: polidactilia).` },
      36:{ text:`Página 36: Conceito: Monstruosidade\n- Alteração morfológica grave que compromete estruturas vitais e gera prejuízo funcional severo, sendo incompatível com a vida.\n- Tabela comparativa:\n  • Normal: Compatível com a vida; Sem prejuízo funcional.\n  • Anomalia: Compatível com a vida; Pode haver prejuízo funcional.\n  • Monstruosidade: Não compatível com a vida; Prejuízo funcional grave.` },

    function updateUI() {
      document.getElementById('slide-num').innerText = `${currentSlide} / ${totalSlides}`;
      document.getElementById('note-num').innerText = currentSlide;
      document.getElementById('progress-fill').style.width = (currentSlide / totalSlides) * 100 + "%";

      const s = slideData[currentSlide];
      const linkBtn = document.getElementById('link-btn');
      if (s && s.links && s.links.length) {
        linkBtn.style.display = 'block';
      } else {
        linkBtn.style.display = 'none';
      }

      const container = document.getElementById('slide-container');

      let html = `
        <img src="assets/slide${currentSlide}.jpg"
             class="slide-image"
             alt="Slide ${currentSlide}"
             loading="lazy"
             onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'><div style=\\'font-size:2rem;margin-bottom:1rem;\\'>📊</div><div>Slide ${currentSlide}</div></div>'">
      `;

      if (s && s.links && s.links.length) {
        html += `<div class="link-buttons">`;
        s.links.forEach(link => {
          html += `
            <a href="${link.url}" target="_blank" rel="noopener noreferrer"
               style="background:${link.color};">
              ${link.label}
            </a>
          `;
        });
        html += `</div>`;
      }

      container.innerHTML = html;

      document.getElementById('prev-btn').disabled = currentSlide === 1;
      document.getElementById('next-btn').disabled = currentSlide === totalSlides;

      if (document.getElementById('notes-panel').classList.contains('active')) loadNotes();
      updateNotesIndicator();
    }

    function updateNotesIndicator() {
      const indicator = document.getElementById('notes-indicator');
      const notes = localStorage.getItem(`note-${currentSlide}`);
      if (notes && notes.trim()) {
        indicator.classList.add('active');
      } else {
        indicator.classList.remove('active');
      }
    }

    function nextSlide() { if (currentSlide < totalSlides) { currentSlide++; updateUI(); } }
    function previousSlide() { if (currentSlide > 1) { currentSlide--; updateUI(); } }

    function toggleNotes() {
      document.getElementById('notes-panel').classList.toggle('active');
      if (document.getElementById('notes-panel').classList.contains('active')) loadNotes();
    }

    function openNotes(open) {
      const panel = document.getElementById('notes-panel');
      if (open) panel.classList.add('active');
      else panel.classList.remove('active');
      if (panel.classList.contains('active')) loadNotes();
    }

    function loadNotes() {
      document.getElementById('notes-text').value = localStorage.getItem(`note-${currentSlide}`) || "";
      updateNotesIndicator();
    }

    function saveNotes() {
      localStorage.setItem(`note-${currentSlide}`, document.getElementById('notes-text').value);
      updateNotesIndicator();
    }

    function extractText() {
      const info = slideData[currentSlide]?.text || `Conteúdo do Slide ${currentSlide}`;
      const ta = document.getElementById('notes-text');
      ta.value += (ta.value ? "\n\n" : "") + `--- SLIDE ${currentSlide} ---\n` + info;
      saveNotes();
    }

    function clearNotes() {
      const confirmed = confirm("Tem certeza que deseja limpar as notas deste slide?");
      if (confirmed) {
        document.getElementById('notes-text').value = "";
        localStorage.removeItem(`note-${currentSlide}`);
        updateNotesIndicator();
      }
    }

    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const txt = document.getElementById('notes-text').value;

      if (!txt.trim()) {
        alert("Notas vazias! Escreva algo antes de baixar.");
        return;
      }

      const doc = new jsPDF({ unit: "mm", format: "a4" });
      const margin = 12;
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const maxWidth = pageWidth - margin * 2;
      const lineHeight = 6;

      doc.setFont("helvetica", "bold");
      doc.setFontSize(14);
      doc.text(`Aula de Anatomia — Slide ${currentSlide}`, margin, 16);

      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);

      const lines = doc.splitTextToSize(txt, maxWidth);

      let y = 26;
      for (let i = 0; i < lines.length; i++) {
        if (y > pageHeight - margin) {
          doc.addPage();
          y = margin;
        }
        doc.text(lines[i], margin, y);
        y += lineHeight;
      }

      doc.save(`Aula_Anatomia_Slide_${currentSlide}.pdf`);
    }

    function toggleFullscreen() {
      const doc = document.documentElement;
      if (!document.fullscreenElement) {
        doc.requestFullscreen().catch(err => console.log("Fullscreen error:", err.message));
      } else {
        document.exitFullscreen().catch(err => console.log("Exit fullscreen error:", err.message));
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowRight") nextSlide();
      if (e.key === "ArrowLeft") previousSlide();
      if (e.key === "Escape") {
        const p = document.getElementById('notes-panel');
        if (p.classList.contains('active')) p.classList.remove('active');
      }

      if (/^[0-9]$/.test(e.key)) {
        let slideNum = parseInt(e.key, 10);
        if (e.key === "0") slideNum = 10;
        goToSlide(slideNum);
      }

      if (e.key.toLowerCase() === "v" && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        toggleVoice();
      }

      if (e.key.toLowerCase() === "l" && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        openCurrentLink();
      }

      if (e.key.toLowerCase() === "n" && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        toggleNotes();
      }

      if (e.key.toLowerCase() === "f" && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        toggleFullscreen();
      }
    });

    document.getElementById('notes-text').addEventListener('input', saveNotes);

    function goToSlide(n) {
      const clamped = Math.min(totalSlides, Math.max(1, Number(n)));
      currentSlide = clamped;
      updateUI();
    }

    updateUI();
  </script>
